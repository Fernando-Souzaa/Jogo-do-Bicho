<!DOCTYPE html>
<html>
<head>
    <title>Jogo do Bicho</title> 
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> 
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}"> 
</head>
<body>

{% extends "base.html" %}

{% block content %}

<!-- TOPO -->
<div class="header">
    <img src="{{ url_for('static', filename='icone.png') }}"> 
    
    <div class="header-text">
        <h1>Jogo do Bicho</h1> 
        <p>confiança e credibilidade</p> 
    </div>
</div>

<!-- MENU -->
<div class="menu"> 
    <a href="/home"><i class="fa-solid fa-house"></i> INÍCIO</a> 
    <a href="/resultados"><i class="fa-solid fa-chart-line"></i> RESULTADOS</a> 
    <a href="/perfil"><i class="fa-solid fa-user"></i> PERFIL</a> 
    <a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> SAIR</a> 
</div>

<!-- CONTEÚDO -->
<div class="container"> 

    <!-- ÁREA CENTRAL -->
    <div class="apostar-box"> 

        <!-- TABELA -->
        <img src="{{ url_for('static', filename='tabela.jpg') }}" class="tabela"> 

        <!-- FORM -->
        <form method="POST">
    <input type="number" name="grupo" placeholder="Grupo (1-25)"> 
    <input type="number" name="valor_grupo" placeholder="Valor no grupo (R$)" min="1" step="0.01">

    <input type="number" name="dezena" placeholder="Dezena (00-99)"> 
    <input type="number" name="valor_dezena" placeholder="Valor na dezena (R$)" min="1" step="0.01"> 

    <select name="horario"> 
        <option>11:00</option>
        <option>14:00</option>
        <option>16:00</option>
        <option>18:00</option>
    </select>

    <input type="date" name="data" required> 

    <button type="submit">APOSTAR</button> 
</form>

    </div>

</div>

<footer>
		<p>&copy; 2026 - Jogo do Bicho. Todos os Direitos Reservados. </p>
	</footer>

{% endblock %}

</body>
</html>
